# Joint feedback stream from the arm — sensor_msgs/JointState at the
# rate the upstream driver publishes (piper_ctrl_single_node fires the
# publisher from its publish_thread; default ~200 Hz on can_piper).
#
# Source topic: `/<arm_namespace>/joint_states_single` (note the
# `_single` suffix — that's the upstream driver's own choice; the
# `joint_states` short name is reserved for the SUBSCRIBER side
# inside piper_ctrl_single_node, which expects MoveIt-style
# planned-pose echo. Keep both topic names disjoint to avoid a
# self-feedback loop.)
#
# Consumed by:
#   - Stage 3A piper_description_rbnx: robot_state_publisher uses this
#     to drive `arm/base_link → arm/link6` joint TFs.
#   - Stage 5 piper_moveit_rbnx: MoveIt's internal state monitor.
[contract]
id      = "robonix/primitive/arm/joint_states"
version = "1"
kind    = "primitive"
idl     = "common_interfaces/sensor_msgs/msg/JointState.msg"

[mode]
type = "topic_out"
