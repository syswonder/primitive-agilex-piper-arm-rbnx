# Lifecycle interface every arm primitive implementation MUST declare.
# `rbnx boot` calls Driver(CMD_INIT, config_json) against this interface
# right after RegisterCapability and waits for ok=true before moving on
# to the next primitive in the YAML.
#
# Defined at PACKAGE level — robonix's global capabilities/ tree
# doesn't ship `primitive/arm/*` yet (it has chassis / camera / lidar /
# imu / audio). codegen + atlas auto-merge package-level contracts.
[contract]
id      = "robonix/primitive/arm/driver"
version = "1"
kind    = "primitive"
idl     = "lifecycle/srv/Driver.srv"

[mode]
type = "rpc"
